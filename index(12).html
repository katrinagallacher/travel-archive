<style>
:root{
  --paper:#e9eef0; --ink:#15242e; --ink-soft:#3f5560; --line:#b9c7cc; --line-soft:#cdd8db; --accent:#b5832a;
  --cell-empty:#d6dfe1; --cell-stroke:rgba(21,36,46,.06);
  --tip-bg:#15242e; --tip-text:#eef3f4; --tip-soft:#9fb4bc; --toggle-bg:rgba(255,255,255,.55);
  --disp:'Space Grotesk',sans-serif; --mono:'IBM Plex Mono',monospace; --body:'Inter',sans-serif;
}
[data-theme="dark"]{
  --paper:#0e171e; --ink:#e6eef2; --ink-soft:#8ba1ac; --line:#2b3b45; --line-soft:#1d2a32; --accent:#d8a23f;
  --cell-empty:#1e2c35; --cell-stroke:rgba(255,255,255,.05);
  --tip-bg:#22323c; --tip-text:#eef3f4; --tip-soft:#9fb4bc; --toggle-bg:rgba(255,255,255,.07);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;
  transition:background-color .25s ease,color .25s ease}
.wrap{max-width:1180px;margin:0 auto;padding:34px 22px 70px}
.toggle{position:fixed;top:14px;right:14px;z-index:60;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  border:1px solid var(--line);background:var(--toggle-bg);color:var(--ink-soft);padding:7px 13px;border-radius:20px;
  cursor:pointer;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);transition:.15s}
.toggle:hover{color:var(--ink);border-color:var(--ink)}
.masthead{border-bottom:2px solid var(--ink);padding-bottom:16px;margin-bottom:4px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);margin:0}
h1{font-family:var(--disp);font-weight:700;font-size:clamp(32px,6vw,58px);line-height:.98;letter-spacing:-.02em;margin:6px 0 0}
.stats{display:flex;flex-wrap:wrap;gap:26px;margin:18px 0 8px;font-family:var(--mono)}
.stat b{font-family:var(--disp);font-weight:700;font-size:26px;display:block;line-height:1}
.stat span{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin:14px 0 26px}
.lg{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;color:var(--ink-soft)}
.lg i{width:11px;height:11px;border-radius:2px;display:inline-block}
.year{margin-bottom:26px}
.yhead{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:10px}
.yhead b{font-family:var(--disp);font-weight:700;font-size:25px;line-height:1}
.yhead span{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.03em}
.cal{overflow-x:auto;padding-bottom:5px}
.calgrid{--c:13px;--g:3px;display:grid;grid-template-areas:". months" "wd cells";grid-template-columns:auto max-content;gap:5px 7px;width:max-content}
.months{grid-area:months;display:grid;column-gap:var(--g);font-family:var(--mono);font-size:10px;color:var(--ink-soft);height:12px}
.months span{grid-row:1;white-space:nowrap}
.wd{grid-area:wd;display:grid;grid-template-rows:repeat(7,var(--c));gap:var(--g);font-family:var(--mono);font-size:9px;color:var(--ink-soft)}
.wd span{display:flex;align-items:center;height:var(--c);line-height:1}
.cells{grid-area:cells;display:grid;grid-template-rows:repeat(7,var(--c));grid-auto-flow:column;grid-auto-columns:var(--c);gap:var(--g)}
.cell{width:var(--c);height:var(--c);border-radius:2.5px;background:var(--cell-empty);box-shadow:inset 0 0 0 1px var(--cell-stroke)}
.cell.t{cursor:pointer;opacity:0;animation:pop .35s forwards}
.cell.t:hover{outline:1.5px solid var(--ink);outline-offset:1px}
@keyframes pop{from{opacity:0;transform:scale(.35)}to{opacity:1;transform:none}}
.tip{position:fixed;pointer-events:none;z-index:50;background:var(--tip-bg);color:var(--tip-text);font-family:var(--mono);
  font-size:11.5px;line-height:1.5;padding:8px 11px;border-radius:6px;max-width:300px;opacity:0;transition:opacity .1s;box-shadow:0 6px 22px rgba(0,0,0,.3)}
.tip b{font-family:var(--disp);font-size:12.5px;display:block;margin-bottom:1px}
.tip i{color:var(--tip-soft);font-style:normal;display:block}
.foot{margin-top:48px;border-top:1px solid var(--line);padding-top:14px;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);letter-spacing:.04em}
@media(max-width:600px){.calgrid{--c:11px;--g:2px}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head>

function fmt(d){const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const x=new Date(d);return m[x.getMonth()]+' '+x.getDate();}
function fmtRange(s,e){const a=new Date(s),b=new Date(e);const sameY=a.getFullYear()===b.getFullYear();if(s===e)return fmt(s)+', '+a.getFullYear();return fmt(s)+(sameY?'':' '+a.getFullYear())+' – '+fmt(e)+', '+b.getFullYear();}
const countries=new Set();TRIPS.forEach(t=>t.c.forEach(c=>countries.add(c)));
document.getElementById('stats').innerHTML=`<div class="stat"><b>${TRIPS.length}</b><span>Trips logged</span></div>
<div class="stat"><b>${countries.size}</b><span>Countries & territories</span></div>
<div class="stat"><b>2011–26</b><span>Years on the move</span></div>`;
document.getElementById('legend').innerHTML=REGIONS.map(([n,c])=>`<span class="lg"><i style="background:${c}"></i>${n}</span>`).join('');

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WD=['Mon','','Wed','','Fri','',''];
const key=d=>d.toISOString().slice(0,10);
function dayRegion(t,k){if(!t.seg)return{r:t.r,place:t.c.join(', ')+' · '+t.r};for(const s of t.seg){if(k<=s[0])return{r:s[1],place:s[2]};}const last=t.seg[t.seg.length-1];return{r:last[1],place:last[2]};}
const dayMap={};
TRIPS.forEach(t=>{let d=new Date(t.s+'T00:00:00');const end=new Date(t.e+'T00:00:00');while(d<=end){const k=key(d);if(!dayMap[k]){const dr=dayRegion(t,k);dayMap[k]={t,r:dr.r,place:dr.place};}d=new Date(d.getTime()+86400000);}});

const cal=document.getElementById('cal'),tip=document.getElementById('tip');let order=0;
for(let y=2011;y<=2026;y++){
  const jan1=new Date(y,0,1),lead=(jan1.getDay()+6)%7;
  const isLeap=(y%4===0&&y%100!==0)||y%400===0,dys=isLeap?366:365;
  const total=lead+dys,weeks=Math.ceil(total/7),trail=weeks*7-total;
  let daysAway=0;const tripSet=new Set();let cellsHTML='';
  for(let i=0;i<lead;i++)cellsHTML+='<div class="cell"></div>';
  for(let d=0;d<dys;d++){
    const dt=new Date(y,0,1+d),k=key(dt),m=dayMap[k];
    if(m){daysAway++;tripSet.add(m.t);
      const info=`${m.t.t} || ${fmtRange(m.t.s,m.t.e)} · ${m.place}`;
      cellsHTML+=`<div class="cell t" style="background:${RC[m.r]};animation-delay:${(order++ %600)*2}ms" data-info="${info.replace(/"/g,'&quot;')}" data-date="${MON[dt.getMonth()]} ${dt.getDate()}, ${y}"></div>`;
    } else cellsHTML+=`<div class="cell" data-date="${MON[dt.getMonth()]} ${dt.getDate()}, ${y}"></div>`;
  }
  for(let i=0;i<trail;i++)cellsHTML+='<div class="cell"></div>';
  let monthsHTML='';
  for(let m=0;m<12;m++){const off=Math.round((new Date(y,m,1)-jan1)/86400000);const col=Math.floor((lead+off)/7)+1;monthsHTML+=`<span style="grid-column:${col}">${MON[m]}</span>`;}
  const sec=document.createElement('section');sec.className='year';
  sec.innerHTML=`<div class="yhead"><b>${y}</b><span>${tripSet.size} trip${tripSet.size!==1?'s':''} · ${daysAway} day${daysAway!==1?'s':''} away</span></div>
  <div class="cal"><div class="calgrid">
    <div class="months" style="grid-template-columns:repeat(${weeks},var(--c))">${monthsHTML}</div>
    <div class="wd">${WD.map(w=>`<span>${w}</span>`).join('')}</div>
    <div class="cells">${cellsHTML}</div>
  </div></div>`;
  cal.appendChild(sec);
}
cal.addEventListener('mousemove',ev=>{
  const c=ev.target.closest('.cell');if(!c||!c.dataset.date){tip.style.opacity=0;return;}
  if(c.dataset.info){const p=c.dataset.info.split(' || ');tip.innerHTML=`<b>${p[0]}</b><i>${p[1]}</i>`;}
  else tip.innerHTML=`<i>${c.dataset.date} — at home</i>`;
  tip.style.opacity=1;let x=ev.clientX+13,yv=ev.clientY+13;
  if(x+310>innerWidth)x=ev.clientX-310;if(yv+64>innerHeight)yv=ev.clientY-64;
  tip.style.left=x+'px';tip.style.top=yv+'px';
});
cal.addEventListener('mouseleave',()=>tip.style.opacity=0);
</script></body></html>
